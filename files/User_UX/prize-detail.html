<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Giải Thưởng</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: linear-gradient(180deg, #4da6e8 0%, #7ec8f0 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        /* Nav */
        nav {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 50;
        }
        nav a {
            color: #fff;
            background: rgba(30,74,138,0.7);
            padding: 8px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            border: 2px solid rgba(255,255,255,0.3);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        nav a:hover { background: rgba(30,74,138,0.95); }

        /* Khung vé thưởng */
        .ticket-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            text-align: center;
            position: relative;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Phần Header của vé */
        .ticket-header {
            background: linear-gradient(135deg, #2b5ea7, #1a3f7a);
            color: #fff;
            padding: 36px 24px 44px;
            border-bottom: 2px dashed rgba(255,255,255,0.4);
            position: relative;
        }

        /* Hiệu ứng khuyết 2 bên vé */
        .ticket-header::after, .ticket-header::before {
            content: '';
            position: absolute;
            bottom: -12px;
            width: 24px;
            height: 24px;
            background: #64b5f6; /* Màu nền web (ước tính) để tạo cảm giác trong suốt */
            border-radius: 50%;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.1);
        }
        .ticket-header::before { left: -12px; }
        .ticket-header::after { right: -12px; }

        .ticket-header h2 {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            opacity: 0.9;
        }

        .prize-name {
            font-size: 1.8rem;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            line-height: 1.3;
        }

        .status-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            color: #fff;
            padding: 6px 14px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            margin-top: 14px;
            border: 1px solid rgba(255,255,255,0.4);
        }

        /* Phần Body của vé */
        .ticket-body {
            padding: 30px 24px 40px;
            background: #fff;
        }

        .info-group {
            margin-bottom: 20px;
        }

        .info-label {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-size: 1.15rem;
            font-weight: 700;
            color: #1a3f7a;
        }

        /* Hộp mã Code */
        .code-box {
            background: #f0f6fc;
            border: 2px dashed #2b5ea7;
            padding: 20px;
            border-radius: 12px;
            margin-top: 24px;
            position: relative;
        }

        .code-value {
            font-size: 2rem;
            font-weight: 900;
            color: #2b5ea7;
            letter-spacing: 3px;
            font-family: monospace;
            margin: 8px 0;
        }

        .code-hint {
            font-size: 0.85rem;
            color: #666;
            margin-top: 8px;
        }

        /* Hiệu ứng copy */
        .copy-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(43,94,167,0.1);
            border: none;
            color: #2b5ea7;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background: rgba(43,94,167,0.2);
        }

        .error-msg {
            color: #fff;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            background: rgba(0,0,0,0.2);
            padding: 20px 40px;
            border-radius: 12px;
        }

        @media (max-width: 500px) {
            .prize-name { font-size: 1.5rem; }
            .code-value { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="history.html">← Quay lại Lịch sử</a>
    </nav>

    <div id="detailContainer"></div>

    <script>
        function formatTime(isoStr) {
            const d = new Date(isoStr);
            const pad = n => String(n).padStart(2, '0');
            return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        function copyCode(codeText) {
            navigator.clipboard.writeText(codeText).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.textContent = 'Đã chép!';
                btn.style.background = '#e8f5e9';
                btn.style.color = '#2e7d32';
                setTimeout(() => {
                    btn.textContent = 'Copy';
                    btn.style.background = 'rgba(43,94,167,0.1)';
                    btn.style.color = '#2b5ea7';
                }, 2000);
            });
        }

        function loadDetail() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const index = params.get('index');
            
            const history = JSON.parse(localStorage.getItem('spinHistory') || '[]');
            let item = null;

            if (code) {
                item = history.find(h => h.code === code);
            } else if (index !== null) {
                item = history[parseInt(index)];
            }

            const container = document.getElementById('detailContainer');

            if (!item) {
                container.innerHTML = `<div class="error-msg">Không tìm thấy thông tin giải thưởng!</div>`;
                return;
            }

            // Nếu người dùng trúng giải từ phiên bản cũ không có code, ta tạo hiển thị mã dự phòng
            const displayCode = item.code || 'TLC-' + Math.random().toString(36).substr(2, 6).toUpperCase();

            container.innerHTML = `
                <div class="ticket-card">
                    <div class="ticket-header">
                        <h2>Chúc Mừng Bạn Trúng</h2>
                        <div class="prize-name">${item.name}</div>
                        <div class="status-badge">✓ Đã lưu hệ thống</div>
                    </div>
                    <div class="ticket-body">
                        <div class="info-group">
                            <div class="info-label">Thời gian trúng giải</div>
                            <div class="info-value">${formatTime(item.time)}</div>
                        </div>
                        <div class="code-box">
                            <button class="copy-btn" id="copyBtn" onclick="copyCode('${displayCode}')">Copy</button>
                            <div class="info-label">Mã nhận thưởng</div>
                            <div class="code-value">${displayCode}</div>
                            <div class="code-hint">Vui lòng cung cấp mã này cho nhân viên để nhận quà</div>
                        </div>
                    </div>
                </div>
            `;
        }

        loadDetail();
    </script>
</body>
</html>
