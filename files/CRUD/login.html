<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Draw - Đăng nhập Quản Trị</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Source Sans Pro', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background-color: #ecf0f5;
    color: #333;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  
  .login-box {
    width: 100%;
    max-width: 400px;
    padding: 20px;
  }
  
  .login-logo {
    font-size: 32px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 25px;
    color: #444;
  }
  
  .login-logo a {
    color: #444;
    text-decoration: none;
  }
  
  .login-logo b {
    color: #3c8dbc;
  }
  
  .login-box-body {
    background: #fff;
    padding: 30px 25px;
    border-top: 4px solid #3c8dbc;
    border-radius: 4px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  }
  
  .login-box-msg {
    text-align: center;
    margin-bottom: 25px;
    color: #666;
    font-size: 15px;
  }
  
  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 13px; color: #555; }
  
  .form-control { 
    width: 100%; 
    padding: 10px 12px; 
    font-size: 14px; 
    border: 1px solid #d2d6de; 
    border-radius: 4px; 
    outline: none; 
    font-family: inherit; 
    transition: border-color 0.2s;
  }
  .form-control:focus { border-color: #3c8dbc; }
  
  .btn-primary { 
    background-color: #3c8dbc; 
    color: #fff; 
    padding: 10px 16px; 
    border-radius: 4px; 
    border: none; 
    cursor: pointer; 
    font-family: inherit; 
    font-weight: 600; 
    font-size: 15px; 
    width: 100%;
    transition: 0.2s; 
  }
  .btn-primary:hover { background-color: #367fa9; }
  
  .help-links {
    margin-top: 15px;
    text-align: center;
    font-size: 13px;
  }
  .help-links a {
    color: #3c8dbc;
    text-decoration: none;
  }
  .help-links a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

  <div class="login-box">
    <div class="login-logo">
      <a href="#"><b>Lucky</b>Draw</a>
    </div>
    
    <div class="login-box-body">
      <p class="login-box-msg">Đăng nhập vào trang quản trị</p>

      <form action="index.html" method="GET">
        <div class="form-group">
          <label>Tên đăng nhập</label>
          <input type="text" class="form-control" placeholder="Nhập username..." required autofocus>
        </div>
        <div class="form-group">
          <label>Mật khẩu</label>
          <input type="password" class="form-control" placeholder="Nhập mật khẩu..." required>
        </div>
        
        <button type="submit" class="btn-primary">Đăng nhập</button>
      </form>
      
      <div class="help-links">
        <a href="#">Quên mật khẩu?</a>
      </div>
    </div>
  </div>

</body>
</html>
