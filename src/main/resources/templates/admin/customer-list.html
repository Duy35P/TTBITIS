<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/layout :: head('Quản lý Khách Hàng')}">
</head>
<body>

   <!-- Header -->
  <header th:replace="~{admin/fragments/layout :: header}"></header>

  <!-- Sidebar -->
  <aside th:replace="~{admin/fragments/layout :: sidebar}"></aside>

  <!-- Content -->
  <div class="content-wrapper">
    <section class="content-header">
      <h1>
        Khách hàng
        <small>Quản lý tài khoản đăng nhập</small>
      </h1>
      <ul class="breadcrumb">
        <li><a href="campaign-list.html">🏠 LuckyDraw</a></li>
        <li>Khách hàng</li>
      </ul>
    </section>
    
    <section class="content">
      <div class="box">
        <div class="box-header">
          <h3 class="box-title">Danh sách Khách hàng</h3>
          <div class="box-tools">
            <input type="text" class="search-box" placeholder="Tìm theo Tên hoặc SĐT...">
            <button class="btn-export">Xuất Excel</button>
          </div>
        </div>
        <div class="box-body">
          <table class="table-striped">
            <thead>
              <tr>
                <th>Khách hàng</th>
                <th>SĐT / Zalo</th>
                <th>Lượt quay khả dụng (Theo CD)</th>
                <th>Quà đã trúng</th>
                <th>Trạng thái</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="customer : ${customers}">
                <td>
                  <div class="customer-profile">
                    <img th:src="'https://ui-avatars.com/api/?name=' + ${customer.tenKhach != null ? customer.tenKhach : 'K'} + '&background=e0f2fe&color=0369a1'" class="customer-avatar" alt="Avatar">
                    <div>
                      <div class="customer-name" th:text="${customer.tenKhach != null ? customer.tenKhach : 'Khách vãng lai'}">Nguyễn Văn A</div>
                      <div class="customer-zalo" th:if="${customer.zaloId != null}">Zalo Login</div>
                    </div>
                  </div>
                </td>
                <td th:text="${customer.phone}">090 123 4567</td>
                <td>
                  <span th:text="${turnsMap[customer.maKhachHang] != null ? turnsMap[customer.maKhachHang] : '0 lượt'}">0 lượt</span>
                </td>
                <td>
                  <!-- Chưa kết nối thống kê quà, hiển thị tĩnh tạm thời -->
                  <span style="color:#777; font-style:italic; font-size:12px;">Đang tải...</span>
                </td>
                <td>
                  <span class="badge bg-green" th:if="${customer.trangThai == 1}">Active</span>
                  <span class="badge bg-red" th:if="${customer.trangThai != 1}">Banned</span>
                </td>
                <td class="action-links">
                  <a href="#">Lịch sử</a> <span class="action-separator">|</span>
                  <form th:action="@{/admin/customers/toggle-status}" method="post" style="display:inline;">
                    <input type="hidden" name="customerId" th:value="${customer.id}" />
                    <input type="hidden" name="status" th:value="${customer.trangThai == 1 ? 0 : 1}" />
                    <button type="submit" 
                            th:class="${customer.trangThai == 1 ? 'text-danger' : ''}" 
                            style="background:none; border:none; cursor:pointer; font-weight:600; padding:0; font-family:inherit; font-size:inherit;" 
                            th:text="${customer.trangThai == 1 ? 'Khóa' : 'Mở khóa'}"
                            onclick="return confirm('Bạn có chắc chắn muốn thay đổi trạng thái tài khoản này?')"></button>
                  </form>
                </td>
              </tr>
            </tbody>
            
          </table>
        </div>
      </div>
    </section>
  </div>

</body>
</html>
