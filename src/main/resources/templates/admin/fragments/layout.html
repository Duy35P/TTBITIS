<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<!-- 1. Head Fragment -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Lucky Draw</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Source Sans Pro', 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #ecf0f5; color: #333; display: flex; min-height: 100vh; overflow-x: hidden; }
      
      /* ===== Header & Sidebar ===== */
      .main-header { position: fixed; top: 0; left: 0; right: 0; height: 50px; background-color: #3c8dbc; z-index: 1000; display: flex; }
      .logo { width: 230px; height: 50px; background-color: #367fa9; color: #fff; font-size: 20px; font-weight: 700; line-height: 50px; text-align: center; text-decoration: none; flex-shrink: 0; }
      .navbar { flex: 1; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
      .sidebar-toggle { color: #fff; font-size: 20px; cursor: pointer; padding: 10px; }
      .user-menu { display: flex; align-items: center; color: #fff; cursor: pointer; padding: 10px; }
      .user-menu img { width: 25px; height: 25px; border-radius: 50%; margin-right: 10px; }
      
      .main-sidebar { position: fixed; top: 50px; left: 0; bottom: 0; width: 230px; background-color: #222d32; z-index: 800; overflow-y: auto; }
      .user-panel { padding: 10px; display: flex; align-items: center; }
      .user-panel img { width: 45px; height: 45px; border-radius: 50%; margin-right: 15px; }
      .user-panel-info { color: #fff; }
      .user-panel-info p { font-weight: 600; margin-bottom: 5px; font-size: 14px; }
      
      .sidebar-menu { list-style: none; margin: 0; padding: 0; }
      .sidebar-menu .header { color: #4b646f; background: #1a2226; padding: 10px 25px 10px 15px; font-size: 12px; text-transform: uppercase; }
      .sidebar-menu li a { padding: 12px 15px; display: flex; align-items: center; color: #b8c7ce; text-decoration: none; font-size: 14px; border-left: 3px solid transparent; }
      .sidebar-menu li a:hover { color: #fff; background: #1e282c; border-left-color: #3c8dbc; }
      .sidebar-menu li.active a { color: #fff; background: #1e282c; border-left-color: #3c8dbc; }
      .sidebar-menu li a span { margin-left: 10px; flex: 1; }
    
      /* ===== Content Wrapper ===== */
      .content-wrapper { margin-left: 230px; margin-top: 50px; padding: 15px; width: calc(100% - 230px); }
      
      .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
      .content-header h1 { font-size: 24px; font-weight: 400; }
      .breadcrumb { display: flex; list-style: none; font-size: 12px; color: #444; }
      .breadcrumb li + li::before { content: '>\00a0'; padding: 0 5px; color: #ccc; }
      .breadcrumb a { color: #444; text-decoration: none; }
      .breadcrumb a:hover { color: #3c8dbc; }
      
      /* ===== Box / Table ===== */
      .box { background-color: #fff; border-top: 3px solid #605ca8; border-radius: 3px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); margin-bottom: 20px; }
      .box-header { padding: 15px; border-bottom: 1px solid #f4f4f4; display: flex; justify-content: space-between; align-items: center; }
      .box-title { font-size: 18px; font-weight: 400; }
      
      .box-tools { display: flex; gap: 10px; }
      .search-box { padding: 6px 12px; font-size: 14px; border: 1px solid #ccc; border-radius: 3px; width: 250px; outline: none; }
      .search-box:focus { border-color: #3c8dbc; }
      
      .btn-primary {
        background-color: #3c8dbc; color: #fff; padding: 6px 12px; border-radius: 3px;
        text-decoration: none; font-size: 14px; font-weight: 600; border: none; cursor: pointer;
      }
      .btn-primary:hover { background-color: #367fa9; }

      .btn-export {
        background-color: #00a65a; color: #fff; padding: 6px 12px; border-radius: 3px;
        text-decoration: none; font-size: 14px; font-weight: 600; border: none; cursor: pointer;
      }
      .btn-export:hover { background-color: #008d4c; }
    
      .box-body { padding: 15px; overflow-x: auto; }
      
      table { width: 100%; border-collapse: collapse; }
      th, td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #f4f4f4; font-size: 14px; vertical-align: middle; }
      th { font-weight: 700; color: #333; }
      .table-striped tbody tr:nth-of-type(odd) { background-color: #f9f9f9; }
      
      /* ===== Custom Text & Profiles ===== */
      .store-info { display: flex; flex-direction: column; }
      .store-name { font-weight: 600; font-size: 15px; color: #333; margin-bottom: 2px; }
      .store-code { font-size: 12px; color: #777; font-family: monospace; background: #eee; padding: 2px 6px; border-radius: 4px; display: inline-block; width: max-content; }
    
      .customer-profile { display: flex; align-items: center; gap: 10px; }
      .customer-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
      .customer-name { font-weight: 600; color: #333; }
      .customer-zalo { font-size: 11px; color: #0068FF; font-weight: 700; background: #e0f2fe; padding: 2px 6px; border-radius: 10px; display: inline-block; margin-top: 3px; }

      .campaign-pill {
        display: inline-block; background-color: #e0f2fe; color: #0284c7; border: 1px solid #bae6fd;
        padding: 3px 8px; border-radius: 50px; font-size: 12px; font-weight: 600; margin: 2px;
      }
      .campaign-pill.pending { background-color: #fef3c7; color: #b45309; border-color: #fde68a; }
      
      .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; display: inline-block; }
      .bg-green { background-color: #00a65a; color: #fff; }
      .bg-red { background-color: #dd4b39; color: #fff; }
      .bg-yellow { background-color: #f39c12; color: #fff; }
    
      .action-links a { color: #3c8dbc; text-decoration: none; font-weight: 600; cursor: pointer; }
      .action-links a:hover { color: #72afd2; text-decoration: underline; }
      .action-separator { color: #ccc; margin: 0 5px; }
      .text-danger { color: #dd4b39 !important; }
    
      /* ===== Modal ===== */
      .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
      .modal.active { display: flex; }
      .modal-content { background-color: #fff; padding: 20px; border-radius: 4px; width: 100%; max-width: 500px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); animation: slideDown 0.3s ease-out; }
      @keyframes slideDown { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f4f4f4; padding-bottom: 15px; margin-bottom: 15px; }
      .modal-title { font-size: 18px; font-weight: 600; }
      .close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: #888; }
      .close-btn:hover { color: #333; }
      .form-group { margin-bottom: 15px; }
      .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
      .form-control { width: 100%; padding: 8px 12px; font-size: 14px; border: 1px solid #ccc; border-radius: 3px; outline: none; font-family: inherit; }
      .form-control:focus { border-color: #3c8dbc; }
      .modal-footer { display: flex; justify-content: flex-end; gap: 10px; border-top: 1px solid #f4f4f4; padding-top: 15px; margin-top: 15px; }
      .btn-default { background-color: #f4f4f4; color: #444; padding: 6px 12px; border-radius: 3px; border: 1px solid #ddd; cursor: pointer; font-family: inherit; font-weight: 600; }
      .btn-warning { background-color: #f39c12; color: #fff; padding: 6px 12px; border-radius: 3px; border: 1px solid #e08e0b; cursor: pointer; font-family: inherit; font-weight: 600; }
    </style>
</head>

<body>
    <!-- 2. Header Fragment -->
    <header th:fragment="header" class="main-header">
        <a href="#" class="logo">LuckyDraw</a>
        <nav class="navbar">
          <div class="sidebar-toggle">☰</div>
          <div class="user-menu">
            <img src="https://ui-avatars.com/api/?name=Admin+User&background=fff&color=3c8dbc" alt="User Image">
            <span>Admin User</span>
          </div>
        </nav>
    </header>
    
    <!-- 3. Sidebar Fragment -->
    <aside th:fragment="sidebar" class="main-sidebar">
        <div class="user-panel">
          <img src="https://ui-avatars.com/api/?name=Admin+User&background=fff&color=3c8dbc" alt="User Image">
          <div class="user-panel-info"><p>Admin User</p></div>
        </div>
        
         <ul class="sidebar-menu">
          <li class="header">Menu Quản Trị</li>
          <!-- TODO: Add endpoints for overview, campaign, etc -->
          <li sec:authorize="hasRole('ADMIN') or hasAuthority('QL_TONGQUAN')"><a th:href="@{/admin}"><span>Tổng quan</span></a></li>
          <li sec:authorize="hasRole('ADMIN') or hasAuthority('QL_CHIENDICH')"><a th:href="@{/admin/campaigns}"><span>Chiến dịch</span></a></li>
          
          <!-- LInk động Spring Boot -->
          <li sec:authorize="hasRole('ADMIN') or hasAuthority('QL_KHACHHANG')"><a th:href="@{/admin/customers}"><span>Khách hàng</span></a></li>
          <li sec:authorize="hasRole('ADMIN') or hasAuthority('QL_CUAHANG')"><a th:href="@{/admin/stores}"><span>Cửa hàng / Đại lý</span></a></li>
          <li sec:authorize="hasRole('ADMIN') or hasAuthority('QL_NHANVIEN')"><a th:href="@{/admin/staffs}"><span>Nhân viên</span></a></li>
          
          <li sec:authorize="hasRole('ADMIN') or hasAuthority('QL_GIAITHUONG') or hasAuthority('QL_PHANBO')"><a th:href="@{/admin/prizes}"><span>Kho giải thưởng</span></a></li>
          <li sec:authorize="hasRole('ADMIN') or hasAuthority('QL_VOUCHER')"><a th:href="@{/admin/vouchers}"><span>Quản lý Voucher</span></a></li>
          <li sec:authorize="hasRole('ADMIN') or hasAuthority('QL_DOIQUA')"><a th:href="@{/admin/redemption}"><span>Đổi Quà (Gạch mã)</span></a></li>
          <li sec:authorize="hasRole('ADMIN') or hasAuthority('QL_LUOTQUAY')"><a th:href="@{/admin/turns}"><span>Biến động Lượt quay</span></a></li>
          <li sec:authorize="hasRole('ADMIN') or hasAuthority('QL_HOADON')"><a th:href="@{/admin/invoices}"><span>Tra cứu Hóa đơn</span></a></li>
          <li><a th:href="@{/admin/profile}"><span>Cài đặt</span></a></li>
          <li>
             <form th:action="@{/admin/logout}" method="post" style="display: inline;">
                 <button type="submit" style="background:none; border:none; color: #b8c7ce; padding: 12px 5px 12px 15px; cursor: pointer; width: 100%; text-align: left;"><i class="fa fa-sign-out"></i> <span>Đăng xuất</span></button>
             </form>
          </li>
        </ul>
    </aside>
</body>
</html>
