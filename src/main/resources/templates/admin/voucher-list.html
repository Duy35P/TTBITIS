<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/layout :: head('Lucky Draw - Quản lý Voucher')}">
</head>
<body>
  <!-- Header -->
  <header th:replace="~{admin/fragments/layout :: header}"></header>

  <!-- Sidebar -->
  <aside th:replace="~{admin/fragments/layout :: sidebar}"></aside>

  <!-- Content -->
  <div class="content-wrapper">
    <section class="content-header">
      <h1>Lịch sử Trúng thưởng / Đổi quà <small>Danh sách Voucher đã phát</small></h1>
      <ul class="breadcrumb">
        <li><a th:href="@{/admin}">🏠 LuckyDraw</a></li>
        <li>Lịch sử Trúng thưởng</li>
      </ul>
    </section>
    
    <section class="content">
      <div class="box">
        <div class="box-header">
          <h3 class="box-title">Danh sách Voucher đã phát hành</h3>
        </div>
        <div class="box-body">
          
          <form method="get" th:action="@{/admin/vouchers}">
          <div class="filter-area" style="display: flex; gap: 15px; margin-bottom: 15px; background: #f9fafb; padding: 15px; border-radius: 4px; border: 1px solid #eee; align-items: flex-end;">
            <div class="filter-group" style="display: flex; flex-direction: column; gap: 5px;">
              <label style="font-size: 12px; font-weight: 600; color: #555;">Lọc theo Giải Thưởng</label>
              <select name="prize" class="form-control" style="padding: 8px 12px; font-size: 14px; border: 1px solid #ccc; border-radius: 3px; outline: none; min-width: 200px;">
                <option value="all">-- Tất cả giải thưởng --</option>
                <option th:each="p : ${prizes}" th:value="${p.maGiaiThuong}" th:text="${p.tenGiai}" th:selected="${selectedPrize == p.maGiaiThuong}"></option>
              </select>
            </div>
            <div class="filter-group" style="display: flex; flex-direction: column; gap: 5px;">
              <label style="font-size: 12px; font-weight: 600; color: #555;">Trạng Thái Voucher</label>
              <select name="status" class="form-control" style="padding: 8px 12px; font-size: 14px; border: 1px solid #ccc; border-radius: 3px; outline: none; min-width: 200px;">
                <option value="all" th:selected="${selectedStatus == 'all'}">-- Tất cả --</option>
                <option value="issued" th:selected="${selectedStatus == 'issued'}">Đã phát (Chưa đổi)</option>
                <option value="redeemed" th:selected="${selectedStatus == 'redeemed'}">Đã đổi quà</option>
              </select>
            </div>
            <div class="filter-group" style="justify-content: flex-end;">
              <button type="submit" class="btn-primary" style="background-color: #3c8dbc; color: #fff; padding: 6px 12px; border-radius: 3px; border: 1px solid #367fa9; font-size: 14px; font-weight: 600; cursor: pointer; height: 38px;">Tìm kiếm</button>
            </div>
          </div>
          </form>

          <table class="table-striped" style="width: 100%; border-collapse: collapse;">
            <thead>
              <tr>
                <th style="padding: 12px 8px; text-align: left; border-bottom: 1px solid #f4f4f4; font-size: 14px;">STT</th>
                <th style="padding: 12px 8px; text-align: left; border-bottom: 1px solid #f4f4f4; font-size: 14px;">Mã Voucher (Code)</th>
                <th style="padding: 12px 8px; text-align: left; border-bottom: 1px solid #f4f4f4; font-size: 14px;">Giải Thưởng</th>
                <th style="padding: 12px 8px; text-align: left; border-bottom: 1px solid #f4f4f4; font-size: 14px;">Khách Hàng</th>
                <th style="padding: 12px 8px; text-align: left; border-bottom: 1px solid #f4f4f4; font-size: 14px;">Nơi Phát Hành (Trúng giải)</th>
                <th style="padding: 12px 8px; text-align: left; border-bottom: 1px solid #f4f4f4; font-size: 14px;">Thông tin đổi quà</th>
                <th style="padding: 12px 8px; text-align: left; border-bottom: 1px solid #f4f4f4; font-size: 14px;">Trạng thái</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="v, iterStat : ${vouchers}" th:style="${iterStat.odd ? 'background-color: #f9f9f9;' : ''}">
                <td style="padding: 12px 8px; border-bottom: 1px solid #f4f4f4;" th:text="${iterStat.count}">1</td>
                <td style="padding: 12px 8px; border-bottom: 1px solid #f4f4f4;"><strong style="font-family: monospace; font-size: 16px;" th:text="${v.maVoucher}"></strong></td>
                <td style="padding: 12px 8px; border-bottom: 1px solid #f4f4f4;" th:text="${v.tenGiai}"></td>
                <td style="padding: 12px 8px; border-bottom: 1px solid #f4f4f4;">
                  <strong th:text="${v.tenKhach}"></strong><br>
                  <span style="font-size: 12px; color: #777;" th:text="${v.phone}"></span>
                </td>
                <td style="padding: 12px 8px; border-bottom: 1px solid #f4f4f4;">
                  <span th:text="${v.tenStorePhatHanh}"></span><br>
                  <span style="font-size: 12px; color: #777;" th:text="'Lúc: ' + ${#temporals.format(v.thoiGianTao, 'dd/MM/yyyy HH:mm:ss')}"></span>
                </td>
                <td style="padding: 12px 8px; border-bottom: 1px solid #f4f4f4;">
                  <th:block th:if="${v.maStoreDoiThuong != null}">
                    <span th:text="${v.tenStoreDoiThuong}"></span><br>
                    <span style="font-size: 12px; color: #777;" th:text="'Lúc: ' + ${#temporals.format(v.thoiGianDoi, 'dd/MM/yyyy HH:mm:ss')}"></span>
                  </th:block>
                  <th:block th:if="${v.maStoreDoiThuong == null}">
                    <i style="color: #999;">Chưa đổi quà</i>
                  </th:block>
                </td>
                <td style="padding: 12px 8px; border-bottom: 1px solid #f4f4f4;">
                  <span th:if="${v.trangThai == 0}" class="badge" style="padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; background-color: #f39c12; color: #fff;">Đã phát</span>
                  <span th:if="${v.trangThai == 1}" class="badge" style="padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; background-color: #00a65a; color: #fff;">Đã đổi quà</span>
                </td>
              </tr>
              <tr th:if="${vouchers == null or vouchers.isEmpty()}">
                <td colspan="7" style="text-align: center; padding: 20px; color: #777;">Chưa có dữ liệu voucher nào</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </div>

</body>
</html>
