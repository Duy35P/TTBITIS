<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/layout :: head('Quản lý Cửa Hàng')}">
</head>
<body>
  <!-- Header -->
  <header th:replace="~{admin/fragments/layout :: header}"></header>

  <!-- Sidebar -->
  <aside th:replace="~{admin/fragments/layout :: sidebar}"></aside>
  <!-- Content -->
  <div class="content-wrapper">
    <section class="content-header">
      <h1>
        Cửa hàng & Đại lý
        <small>Quản lý phân bổ chiến dịch</small>
      </h1>
      <ul class="breadcrumb">
        <li><a href="campaign-list.html">🏠 LuckyDraw</a></li>
        <li>Cửa hàng</li>
      </ul>
    </section>
    
    <section class="content">
      <div class="box">
        <div class="box-header">
          <h3 class="box-title">Danh sách Cửa Hàng / Đại Lý</h3>
          <div class="box-tools">
            <input type="text" class="search-box" placeholder="Tìm tên cửa hàng, mã đại lý...">
            <button class="btn-primary" onclick="openModal('storeModal', 'Thêm Cửa Hàng Mới')">+ Thêm Cửa Hàng</button>
          </div>
        </div>
        <div class="box-body">
          <table class="table-striped">
            <thead>
              <tr>
                <th>Thông tin Cửa hàng</th>
                <th>Địa chỉ</th>
                <th>Chiến dịch đang chạy</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="store : ${stores}">
                <td>
                  <div class="store-info">
                    <span class="store-name" th:text="${store.tenCuaHang}">Tên cửa hàng</span>
                    <span class="store-code" th:text="'Mã: ' + ${store.maStore}">Mã: ST-HD001</span>
                  </div>
                </td>
                <td th:text="${store.diaChiStore}">Địa chỉ</td>
                <td>
                  <div th:if="${storeCampaignsMap != null and storeCampaignsMap.get(store.storeId) != null and !storeCampaignsMap.get(store.storeId).isEmpty()}">
                    <span th:each="campaign : ${storeCampaignsMap.get(store.storeId)}" 
                          style="display:inline-block; background-color: #e8f4f8; color: #3c8dbc; padding: 2px 6px; border-radius: 3px; font-size: 12px; margin-right: 4px; margin-bottom: 2px;"
                          th:text="${campaign.tenChienDich}"></span>
                  </div>
                  <span th:if="${storeCampaignsMap == null or storeCampaignsMap.get(store.storeId) == null or storeCampaignsMap.get(store.storeId).isEmpty()}" style="color:#aaa; font-style:italic; font-size:12px;">Chưa có</span>
                </td>
                <td>
                  <span class="badge bg-green" th:if="${store.trangThai == 1}">Hoạt động</span>
                  <span class="badge" style="background-color: #f39c12; color: #fff;" th:if="${store.trangThai != 1}">Tạm ngưng</span>
                </td>
                <td class="action-links">
                  <a href="javascript:void(0)" 
                     th:data-id="${store.storeId}" 
                     th:data-name="${store.tenCuaHang}" 
                     th:data-code="${store.maStore}" 
                     th:data-address="${store.diaChiStore}"
                     th:data-status="${store.trangThai}"
                     onclick="openEditModal(this)">Sửa</a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </div>

  <!-- Modals -->
  <!-- Modal Thêm/Sửa Cửa Hàng -->
  <div id="storeModal" class="modal">
    <div class="modal-content">
      <form th:action="@{/admin/stores/save}" method="post">
        <input type="hidden" id="storeId" name="storeId">
        
        <div class="modal-header">
          <div class="modal-title" id="storeModalTitle">Thêm Cửa Hàng Mới</div>
          <button type="button" class="close-btn" onclick="closeModal('storeModal')">&times;</button>
        </div>
        <div class="form-group">
          <label>Tên Cửa hàng / Đại lý *</label>
          <input type="text" class="form-control" name="tenCuaHang" id="storeName" placeholder="Ví dụ: Đại lý Cấp 1 - Hà Nội" required>
        </div>
        <div class="form-group">
          <label>Mã Đại lý (Tự động tạo hoặc nhập tay)</label>
          <input type="text" class="form-control" name="maStore" id="storeCode" placeholder="Ví dụ: DL-HN001" required>
        </div>
        <div class="form-group">
          <label>Địa chỉ chi tiết *</label>
          <input type="text" class="form-control" name="diaChiStore" id="storeAddress" placeholder="Nhập địa chỉ đầy đủ" required>
        </div>
        <div class="form-group">
          <label>Trạng thái</label>
          <select class="form-control" name="trangThai" id="storeStatus">
            <option value="1">Hoạt động</option>
            <option value="0">Tạm ngưng</option>
          </select>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-default" onclick="closeModal('storeModal')">Hủy</button>
          <button type="submit" class="btn-primary">Lưu Cửa Hàng</button>
        </div>
      </form>
    </div>
  </div>


  <script>
    function openModal(modalId, title) {
      document.getElementById(modalId).classList.add('active');
      document.getElementById('storeModalTitle').textContent = title || 'Thêm Cửa Hàng Mới';
      
      // Reset form if it's new
      if(title !== 'Sửa Cửa Hàng') {
          document.getElementById('storeId').value = '';
          document.getElementById('storeName').value = '';
          document.getElementById('storeCode').value = '';
          document.getElementById('storeAddress').value = '';
          document.getElementById('storeStatus').value = '1';
      }
    }
    
    function openEditModal(btn) {
      document.getElementById('storeModal').classList.add('active');
      document.getElementById('storeModalTitle').textContent = 'Sửa Cửa Hàng';
      
      document.getElementById('storeId').value = btn.getAttribute('data-id');
      document.getElementById('storeName').value = btn.getAttribute('data-name');
      document.getElementById('storeCode').value = btn.getAttribute('data-code');
      document.getElementById('storeAddress').value = btn.getAttribute('data-address');
      document.getElementById('storeStatus').value = btn.getAttribute('data-status');
    }
    
    function closeModal(modalId) {
      document.getElementById(modalId).classList.remove('active');
    }

    // Đóng modal khi click ra ngoài
    window.addEventListener('mousedown', function(event) {
      if (event.target.classList.contains('modal')) {
        event.target.classList.remove('active');
      }
    });
  </script>
</body>
</html>
