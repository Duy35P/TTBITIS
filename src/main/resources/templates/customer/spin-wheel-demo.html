<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng Quay May Mắn</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* bg is set by JS */
        }

        h1 {
            color: #fff;
            font-size: 1.8rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 24px;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.2);
        }

        .wheel-stage {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Kim chỉ vàng */
        .pointer {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 44px solid #ffd700;
            filter: drop-shadow(0 3px 6px rgba(0,0,0,0.3));
        }

        
        .wheel-wrapper {
            position: relative;
            width: 85vw;
            max-width: 420px;
            height: 85vw;
            max-height: 420px;
        }

        /* Viền xanh dày */
        .blue-ring {
            position: absolute;
            top: -22px;
            left: -22px;
            right: -22px;
            bottom: -22px;
            border-radius: 50%;
            box-shadow: 0 6px 30px rgba(0,0,0,0.3), inset 0 2px 8px rgba(255,255,255,0.15);
            /* background is set by JS */
        }

        .blue-ring-inner {
            position: absolute;
            top: 18px;
            left: 18px;
            right: 18px;
            bottom: 18px;
            border-radius: 50%;
            background: #ccc;
        }

        /* Viền trắng mỏng bên trong */
        .white-ring {
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.6);
            z-index: 4;
            pointer-events: none;
        }

        #wheelCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 50%;
            z-index: 3;
        }

        /* Nút giữa */
        .center-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid #ffd700;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            color: #fff;
            line-height: 1.1;
            /* background is set by JS */
        }

        .center-btn:hover {
            transform: translate(-50%, -50%) scale(1.08);
        }

        .center-btn:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        .center-btn .logo-text {
            font-size: 0.9rem;
            font-weight: 900;
            color: #ffd700;
        }

        .center-btn .logo-sub {
            font-size: 0.5rem;
            font-weight: 600;
            color: rgba(255,255,255,0.8);
            letter-spacing: 1px;
        }

        .center-btn.disabled {
            pointer-events: none;
            opacity: 0.7;
        }

        /* Nút quay */
        .spin-btn {
            margin-top: 30px;
            padding: 14px 50px;
            font-size: 1.15rem;
            font-weight: 800;
            font-family: 'Be Vietnam Pro', sans-serif;
            color: #fff;
            border: 3px solid #ffd700;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
            /* background is set by JS */
        }

        .spin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.35);
        }

        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== Boxes Styles ===== */
        .boxes-stage {
            display: none;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .boxes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .single-box-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 250px;
        }
        .box-item {
            background: transparent;
            border: none;
            border-radius: 15px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            cursor: pointer;
            box-shadow: none;
            transition: transform 0.2s;
            filter: drop-shadow(0 6px 10px rgba(0,0,0,0.4));
        }
        .box-item.single {
            width: 220px;
            height: 220px;
            font-size: 8rem;
        }
        .box-item:hover {
            transform: scale(1.1);
        }
        .box-item.shake {
            animation: boxShake 0.4s ease-in-out infinite;
            pointer-events: none;
        }
        .box-item.disabled {
            pointer-events: none;
            opacity: 0.7;
        }
        @keyframes boxShake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(5deg) scale(1.05); }
            50% { transform: rotate(0deg); }
            75% { transform: rotate(-5deg) scale(1.05); }
            100% { transform: rotate(0deg); }
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active { display: flex; }

        .modal-box {
            background: #fff;
            border: 4px solid #2b5ea7;
            border-radius: 20px;
            padding: 36px;
            text-align: center;
            max-width: 360px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            animation: popIn 0.4s ease;
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-box h2 { color: #2b5ea7; font-size: 1.4rem; margin-bottom: 8px; }
        .modal-box .prize-name { font-size: 1.6rem; font-weight: 900; color: #1a3f7a; margin: 14px 0; }
        .modal-box p { color: #666; margin-bottom: 18px; }

        .modal-box button {
            padding: 10px 36px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Be Vietnam Pro', sans-serif;
            color: #fff;
            background: #2b5ea7;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }

        .modal-box button:hover { background: #1a3f7a; }

        @media (max-width: 500px) {
            h1 { font-size: 1.3rem; }
            .center-btn { width: 16vw; height: 16vw; max-width: 80px; max-height: 80px; }
            .center-btn .logo-text { font-size: 0.75rem; }
            .center-btn .logo-sub { font-size: 0.4rem; }
            
            .pointer {
                top: -8px;
                border-left-width: 14px;
                border-right-width: 14px;
                border-top-width: 32px;
            }
            .pointer::after {
                top: -38px;
                left: -10px;
                width: 20px;
                height: 20px;
            }
        }
    </style>
</head>
<body>
      <div th:if="${isPreview}" style="background: #ff9800; color: white; text-align: center; padding: 10px; position: fixed; top: 0; width: 100%; z-index: 1000; font-weight: bold; font-family: sans-serif; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
          🚧 ĐANG Ở CHẾ ĐỘ XEM TRƯỚC (PREVIEW MODE) - QUAY THỬ KHÔNG LÀM TRỪ KHO GIẢI THƯỞNG 🚧
      </div>

    <!-- ponytail: native HTML details tag replaces JS sidebar, 0 JS, 100% lazy -->
    <details style="position: fixed; top: 16px; left: 16px; z-index: 50;">
        <summary style="list-style: none; background: rgba(30,74,138,0.9); color: #fff; padding: 10px 16px; border-radius: 50px; font-weight: bold; cursor: pointer; border: 2px solid rgba(255,255,255,0.3); box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
            ☰ Menu
        </summary>
        <nav style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px;">
        <a href="/customer/index" 
style="color:#fff;background:rgba(30,74,138,0.7);padding:8px 16px;border-radius:50px;text-decoration:none;font-weight:700;font-size:0.9rem;border:2px solid rgba(255,255,255,0.3);transition:all 0.2s;display:flex;align-items:center;gap:6px;"
           onmouseover="this.style.background='rgba(30,74,138,0.95)'" 
           onmouseout="this.style.background='rgba(30,74,138,0.7)'">
            🏠 Trang chủ
        </a>
        <a href="/customer/account" 
style="color:#fff;background:rgba(30,74,138,0.7);padding:8px 16px;border-radius:50px;text-decoration:none;font-weight:700;font-size:0.9rem;border:2px solid rgba(255,255,255,0.3);transition:all 0.2s;display:flex;align-items:center;gap:6px;"
           onmouseover="this.style.background='rgba(30,74,138,0.95)'" 
           onmouseout="this.style.background='rgba(30,74,138,0.7)'">
            👤 Tài khoản
        </a>
        <a href="/customer/history" 
style="color:#fff;background:rgba(30,74,138,0.7);padding:8px 16px;border-radius:50px;text-decoration:none;font-weight:700;font-size:0.9rem;border:2px solid rgba(255,255,255,0.3);transition:all 0.2s;display:flex;align-items:center;gap:6px;"
           onmouseover="this.style.background='rgba(30,74,138,0.95)'" 
           onmouseout="this.style.background='rgba(30,74,138,0.7)'">
            🎁 Lịch sử
        </a>
        </nav>
    </details>

    <h1 id="appTitle">VÒNG QUAY MAY MẮN</h1>

    <div class="wheel-stage" id="wheelStage">
        <div class="pointer"> </div>

        <div class="wheel-wrapper">
            <div class="blue-ring" id="wheelRing"><div class="blue-ring-inner"></div></div>
            <div class="white-ring"></div>
            <canvas id="wheelCanvas" width="840" height="840"></canvas>
            <div class="center-btn" id="centerBtn">
                <span class="logo-text" id="centerText1">QUAY</span>
                <span class="logo-sub" id="centerText2">THƯỞNG</span>
            </div>
        </div>
    </div>

    <button class="spin-btn" id="spinBtn">Quay ngay</button>
    
    <div class="boxes-stage" id="boxesStage">
        <div id="boxesGrid">
            <!-- Boxes generated by JS -->
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-box">
            <h2 id="modalTitle">Chúc mừng!</h2>
            <div class="prize-name" id="modalPrize"></div>
            <p id="modalDesc">Bạn đã nhận được phần thưởng!</p>
            <button id="modalClose">Đóng</button>
        </div>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        const campaignId = /*[[${campaignId}]]*/ 'default';
        const isPreview = /*[[${isPreview != null ? isPreview : false}]]*/ false;
        /*]]>*/

        let wheelConfig = {};

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const centerBtn = document.getElementById('centerBtn');
        const modal = document.getElementById('modal');

        let isSpinning = false;
        let currentRotation = 0;

        function adjustColor(color, amount) {
            return '#' + color.replace(/^#/, '').replace(/../g, color => ('0'+Math.min(255, Math.max(0, parseInt(color, 16) + amount)).toString(16)).substr(-2));
        }

        // Apply Dynamic Config
        function applyConfig() {
            if(!wheelConfig.prizes) return;
            document.getElementById('appTitle').textContent = wheelConfig.title || 'VÒNG QUAY MAY MẮN';
            document.getElementById('centerText1').textContent = wheelConfig.centerText1 || 'QUAY';
            document.getElementById('centerText2').textContent = wheelConfig.centerText2 || 'THƯỞNG';
            spinBtn.textContent = wheelConfig.buttonText || 'Quay ngay';

            // Background Image
            if (wheelConfig.bgImage) {
                document.body.style.backgroundImage = `url(${wheelConfig.bgImage})`;
                document.body.style.backgroundSize = 'cover';
                document.body.style.backgroundPosition = 'center';
            } else {
                document.body.style.background = `linear-gradient(180deg, ${wheelConfig.bgTop || '#4da6e8'} 0%, ${wheelConfig.bgBottom || '#7ec8f0'} 100%)`;
            }
            
            const ringColor = wheelConfig.ringColor || '#2b5ea7';
            const ringLight = adjustColor(ringColor, 20);
            const ringDark = adjustColor(ringColor, -20);
            document.getElementById('wheelRing').style.background = `linear-gradient(145deg, ${ringLight}, ${ringDark}, ${ringLight})`;
            
            const btnColor = wheelConfig.btnColor || ringColor;
            const btnLight = adjustColor(btnColor, 20);
            const btnDark = adjustColor(btnColor, -20);
            centerBtn.style.background = `linear-gradient(145deg, ${btnLight}, ${btnDark})`;
            spinBtn.style.background = `linear-gradient(to bottom, ${btnLight}, ${btnDark})`;
            
            // Interaction Type
            if (wheelConfig.interactionType === 'boxes' || wheelConfig.interactionType === 'single_box') {
                document.getElementById('wheelStage').style.display = 'none';
                spinBtn.style.display = 'none';
                document.getElementById('boxesStage').style.display = 'block';
                renderBoxes();
            } else {
                document.getElementById('wheelStage').style.display = 'flex';
                spinBtn.style.display = 'block';
                document.getElementById('boxesStage').style.display = 'none';
            }
        }
        
        function renderBoxes() {
            document.getElementById('wheelStage').style.display = 'none';
            document.getElementById('boxesStage').style.display = 'block';
            
            const grid = document.getElementById('boxesGrid');
            grid.innerHTML = '';
            
            const boxContent = wheelConfig.boxImage 
                ? `<img src="${wheelConfig.boxImage}" style="width: 100%; height: 100%; object-fit: contain;">` 
                : '🎁';

            if (wheelConfig.interactionType === 'boxes') {
                grid.className = 'boxes-grid';
                for(let i=0; i<9; i++) {
                    const box = document.createElement('button');
                    box.className = 'box-item';
                    box.innerHTML = boxContent;
                    box.onclick = () => openBox(box);
                    grid.appendChild(box);
                }
            } else {
                grid.className = 'single-box-container';
                const box = document.createElement('button');
                box.className = 'box-item single';
                box.innerHTML = boxContent;
                box.onclick = () => openBox(box);
                grid.appendChild(box);
            }
            return;
        }

        async function openBox(boxElement) {
            if (isSpinning) return;
            isSpinning = true;
            
            // Disable all boxes
            document.querySelectorAll('.box-item').forEach(b => b.classList.add('disabled'));
            
            // Add shake animation
            boxElement.classList.add('shake');
            
            let prizeIndex = 0;
            if (isPreview) {
                prizeIndex = Math.floor(Math.random() * wheelConfig.prizes.length);
            } else {
                try {
                    const response = await fetch(`/customer/api/spin/play?campaign=${campaignId}`, {
                        method: 'POST'
                    });
                    const data = await response.json();
                    if (!response.ok) {
                        alert(data.error || 'Lỗi hệ thống');
                        isSpinning = false;
                        document.querySelectorAll('.box-item').forEach(b => b.classList.remove('disabled'));
                        boxElement.classList.remove('shake');
                        return;
                    }
                    prizeIndex = data.prizeIndex;
                } catch (err) {
                    alert('Không thể kết nối tới máy chủ');
                    isSpinning = false;
                    document.querySelectorAll('.box-item').forEach(b => b.classList.remove('disabled'));
                    boxElement.classList.remove('shake');
                    return;
                }
            }
            
            setTimeout(() => {
                boxElement.classList.remove('shake');
                isSpinning = false;
                showResult(wheelConfig.prizes[prizeIndex]);
            }, 1200);
        }

        function drawWheel(rotation) {
            if(!wheelConfig.prizes) return;
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const r = cx - 16;
            const n = wheelConfig.prizes.length;
            const slice = (2 * Math.PI) / n;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(rotation);

            for (let i = 0; i < n; i++) {
                const start = i * slice;
                const end = start + slice;

                // Ô
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, r, start, end);
                ctx.closePath();
                ctx.fillStyle = wheelConfig.prizes[i].color;
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 4;
                ctx.stroke();

                // Draw configured emoji icon or Base64 Image
                ctx.save();
                ctx.rotate(start + slice / 2);
                const iconX = r * 0.65;
                
                if (wheelConfig.prizes[i].imgObj) {
                    const imgSize = 75;
                    ctx.drawImage(wheelConfig.prizes[i].imgObj, iconX - imgSize/2, -imgSize/2, imgSize, imgSize);
                } else {
                    ctx.beginPath();
                    ctx.arc(iconX, 0, 45, 0, 2 * Math.PI);
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    
                    ctx.font = '45px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(wheelConfig.prizes[i].icon || '🎁', iconX, 0);
                }

                ctx.restore();
            }

            // Viền vòng tròn giữa
            ctx.beginPath();
            ctx.arc(0, 0, 68, 0, 2 * Math.PI);
            ctx.fillStyle = wheelConfig.btnColor || wheelConfig.ringColor || '#1a3f7a';
            ctx.fill();
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 6;
            ctx.stroke();

            ctx.restore();
        }

        async function spin() {
            if (isSpinning) return;
            isSpinning = true;
            spinBtn.disabled = true;
            centerBtn.classList.add('disabled');
            
            let prizeIndex = 0;
            
            if (isPreview) {
                prizeIndex = Math.floor(Math.random() * wheelConfig.prizes.length);
            } else {
                try {
                    // Gọi API để Backend thực hiện trừ lượt và chốt giải
                    const response = await fetch(`/customer/api/spin/play?campaign=${campaignId}`, {
                        method: 'POST'
                    });
                    const data = await response.json();
                    
                    if (!response.ok) {
                        alert(data.error || 'Lỗi hệ thống');
                        isSpinning = false;
                        spinBtn.disabled = false;
                        centerBtn.classList.remove('disabled');
                        return;
                    }
                    
                    prizeIndex = data.prizeIndex;
                } catch (err) {
                    alert('Không thể kết nối tới máy chủ');
                    isSpinning = false;
                    spinBtn.disabled = false;
                    centerBtn.classList.remove('disabled');
                    return;
                }
            }

            const n = wheelConfig.prizes.length;
            const sliceAngle = 360 / n;
            const extraSpins = 5 + Math.floor(Math.random() * 3);
            const targetAngle = (270 - (prizeIndex * sliceAngle + sliceAngle / 2) + 360) % 360;
            const totalRotation = currentRotation + extraSpins * 360 + targetAngle - (currentRotation % 360);

            const startTime = performance.now();
            const duration = 5000;
            const startRot = currentRotation;

            function animate(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 4);
                currentRotation = startRot + (totalRotation - startRot) * eased;
                drawWheel((currentRotation * Math.PI) / 180);

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    isSpinning = false;
                    spinBtn.disabled = false;
                    centerBtn.classList.remove('disabled');
                    showResult(wheelConfig.prizes[prizeIndex]);
                }
            }
            requestAnimationFrame(animate);
        }

        function showResult(prize) {
            document.getElementById('modalPrize').textContent = prize.name;
            if (prize.isPrize === false) {
                document.getElementById('modalTitle').textContent = 'Tiếc quá!';
                document.getElementById('modalDesc').textContent = 'Chúc bạn may mắn lần sau nhé!';
            } else {
                document.getElementById('modalTitle').textContent = 'Chúc mừng!';
                document.getElementById('modalDesc').textContent = 'Bạn đã nhận được phần thưởng!';

                // Lưu vào localStorage
                const history = JSON.parse(localStorage.getItem('spinHistory') || '[]');
                const code = 'TLC-' + Math.random().toString(36).substr(2, 6).toUpperCase();
                history.unshift({
                    name: prize.name,
                    time: new Date().toISOString(),
                    code: code
                });
                localStorage.setItem('spinHistory', JSON.stringify(history));
            }
            modal.classList.add('active');
        }

        spinBtn.addEventListener('click', spin);
        centerBtn.addEventListener('click', spin);
        document.getElementById('modalClose').addEventListener('click', () => { 
            modal.classList.remove('active');
            if (wheelConfig.interactionType === 'boxes' || wheelConfig.interactionType === 'single_box') {
                document.querySelectorAll('.box-item').forEach(b => b.classList.remove('disabled'));
            }
        });
        modal.addEventListener('click', (e) => { 
            if (e.target === modal) {
                modal.classList.remove('active');
                if (wheelConfig.interactionType === 'boxes' || wheelConfig.interactionType === 'single_box') {
                    document.querySelectorAll('.box-item').forEach(b => b.classList.remove('disabled'));
                }
            }
        });

        async function initWheel() {
            try {
                const response = await fetch(`/customer/api/spin/config?campaign=${campaignId}`);
                const config = await response.json();
                
                if (!response.ok) {
                    alert(config.error || 'Lỗi tải cấu hình');
                    return;
                }
                
                wheelConfig = config;
                applyConfig();
                
                // Load Base64 Images if any exist
                let imagesToLoad = 0;
                let imagesLoaded = 0;
                wheelConfig.prizes.forEach(p => {
                    if (p.icon && p.icon.startsWith('data:image')) {
                        imagesToLoad++;
                        const img = new Image();
                        img.onload = () => {
                            p.imgObj = img;
                            imagesLoaded++;
                            if (imagesLoaded === imagesToLoad) {
                                drawWheel(0);
                            }
                        };
                        img.src = p.icon;
                    }
                });
                
                if (imagesToLoad === 0) {
                    drawWheel(0);
                }
                
            } catch (err) {
                console.error(err);
                alert('Không thể tải cấu hình vòng quay.');
            }
        }

        initWheel();
    </script>
</body>
</html>
