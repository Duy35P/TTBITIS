<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cập Nhật Số Điện Thoại - LuckyDraw</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-body: #f3f4f6;
            --bg-card: #ffffff;
            --text-main: #111827;
            --text-muted: #4b5563;
            --border: #e5e7eb;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .card { background: var(--bg-card); border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05); width: 100%; max-width: 400px; overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 24px; text-align: center; }
        .header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
        .header p { font-size: 0.95rem; opacity: 0.9; }
        .body { padding: 32px 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 8px; color: var(--text-main); font-size: 0.95rem; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; transition: border-color 0.2s, box-shadow 0.2s; outline: none; }
        .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2); }
        .btn-submit { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background-color 0.2s; }
        .btn-submit:hover { background: var(--primary-hover); }
        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; }
        .alert-error { background-color: #fee2e2; color: #b91c1c; border: 1px solid #f87171; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>Cập nhật thông tin</h1>
            <p>Vui lòng bổ sung số điện thoại để tiếp tục tham gia chương trình quay thưởng.</p>
        </div>
        <div class="body">
            <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>
            <form action="/customer/update-phone" method="post">
                <div class="form-group">
                    <label for="phone">Số điện thoại của bạn</label>
                    <input type="tel" id="phone" name="phone" placeholder="Nhập số điện thoại (ví dụ: 0901234567)" required pattern="[0-9]{9,15}" title="Vui lòng nhập số điện thoại hợp lệ từ 9 đến 15 chữ số">
                </div>
                <button type="submit" class="btn-submit">Xác nhận & Tiếp tục</button>
            </form>
        </div>
    </div>
</body>
</html>
