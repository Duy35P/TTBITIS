<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Giải Thưởng</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: linear-gradient(180deg, #4da6e8 0%, #7ec8f0 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        /* Nav */
        nav {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 50;
        }
        nav a {
            color: #fff;
            background: rgba(30,74,138,0.7);
            padding: 8px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            border: 2px solid rgba(255,255,255,0.3);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        nav a:hover { background: rgba(30,74,138,0.95); }

        /* Khung vé thưởng */
        .ticket-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            text-align: center;
            position: relative;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Phần Header của vé */
        .ticket-header {
            background: linear-gradient(135deg, #2b5ea7, #1a3f7a);
            color: #fff;
            padding: 36px 24px 44px;
            border-bottom: 2px dashed rgba(255,255,255,0.4);
            position: relative;
        }

        /* Hiệu ứng khuyết 2 bên vé */
        .ticket-header::after, .ticket-header::before {
            content: '';
            position: absolute;
            bottom: -12px;
            width: 24px;
            height: 24px;
            background: #64b5f6; /* Màu nền web (ước tính) để tạo cảm giác trong suốt */
            border-radius: 50%;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.1);
        }
        .ticket-header::before { left: -12px; }
        .ticket-header::after { right: -12px; }

        .ticket-header h2 {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            opacity: 0.9;
        }

        .prize-name {
            font-size: 1.8rem;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            line-height: 1.3;
        }

        .expiry-date {
            font-size: 0.9rem;
            margin-top: 5px;
            color: rgba(255,255,255,0.9);
            font-weight: 500;
        }

        .status-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            color: #fff;
            padding: 6px 14px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            margin-top: 14px;
            border: 1px solid rgba(255,255,255,0.4);
        }

        /* Phần Body của vé */
        .ticket-body {
            padding: 30px 24px 40px;
            background: #fff;
        }

        .info-group {
            margin-bottom: 20px;
        }

        .info-label {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-size: 1.15rem;
            font-weight: 700;
            color: #1a3f7a;
        }

        /* Hộp mã Code */
        .code-box {
            background: #fff;
            padding: 0;
            margin-top: 20px;
            text-align: center;
            position: relative;
        }

        .code-value {
            font-size: 1.4rem;
            font-weight: 900;
            color: #0056b3;
            letter-spacing: 2px;
            font-family: monospace;
            margin-bottom: 20px;
        }

        .qr-code {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .barcode {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            width: 100%;
        }

        .barcode svg {
            max-width: 100%;
            height: auto;
        }



        .error-msg {
            color: #fff;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            background: rgba(0,0,0,0.2);
            padding: 20px 40px;
            border-radius: 12px;
        }

        @media (max-width: 500px) {
            .prize-name { font-size: 1.5rem; }
            .code-value { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="/customer/history">← Quay lại Lịch sử</a>
    </nav>

    <div id="detailContainer">
        <div class="error-msg" th:if="${voucher == null}">Không tìm thấy thông tin giải thưởng!</div>

        <div class="ticket-card" th:unless="${voucher == null}">
            <div class="ticket-header">
                <h2>Chúc Mừng Bạn Trúng</h2>
                <div class="prize-name" th:text="${voucher.tenGiai}">Tên giải thưởng</div>
                <div class="expiry-date" th:if="${customExpiry != null}"
                     th:text="'HSD: ' + ${#temporals.format(customExpiry, 'HH:mm dd/MM/yyyy')}">
                </div>
            </div>
            <div class="ticket-body">
                <div class="info-group">
                    <div class="info-label">Thời gian trúng giải</div>
                    <div class="info-value" th:text="${#temporals.format(voucher.thoiGianTao, 'dd/MM/yyyy HH:mm')}">01/01/2026</div>
                </div>
                <div class="code-box">
                    <div class="code-value" id="voucherCodeText" th:text="${voucher.maVoucher}">XXXXXX</div>
                    
                    <div class="qr-code" id="qrcode"></div>
                    <div class="barcode">
                        <svg id="barcode"></svg>
                    </div>
                </div>
                
                <div class="info-group" th:if="${voucher.trangThai == 1}" style="margin-top: 15px;">
                    <div class="info-label">Đã nhận tại</div>
                    <div class="info-value" th:text="${voucher.tenStoreDoiThuong}">Tên Store</div>
                    <div class="info-label" style="margin-top: 5px;">Thời gian đổi</div>
                    <div class="info-value" th:text="${#temporals.format(voucher.thoiGianDoi, 'dd/MM/yyyy HH:mm')}">02/01/2026</div>
                </div>
            </div>
        </div>
    </div>

    <script>

        document.addEventListener('DOMContentLoaded', function() {
            var voucherCode = document.getElementById('voucherCodeText').innerText.trim();
            if (voucherCode && voucherCode !== 'XXXXXX') {
                new QRCode(document.getElementById("qrcode"), {
                    text: voucherCode,
                    width: 180,
                    height: 180,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });

                JsBarcode("#barcode", voucherCode, {
                    format: "CODE128",
                    lineColor: "#000",
                    width: 2,
                    height: 80,
                    displayValue: false,
                    margin: 0
                });
            }
        });
    </script>
</body>
</html>
