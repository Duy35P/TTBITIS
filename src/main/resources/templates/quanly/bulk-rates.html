<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{quanly/fragments/layout :: head('Lucky Draw - Điều Chỉnh Tỉ Lệ Hàng Loạt')}">
</head>
<body>
  <!-- Header -->
  <header th:replace="~{quanly/fragments/layout :: header}"></header>

  <!-- Sidebar -->
  <aside th:replace="~{quanly/fragments/layout :: sidebar}"></aside>

  <!-- Content -->
  <div class="content-wrapper">
    <section class="content-header">
      <h1>Điều Chỉnh Tỉ Lệ Hàng Loạt <small th:text="${campaign != null ? campaign.tenChienDich : ''}"></small></h1>
      <ul class="breadcrumb">
        <li><a th:href="@{/quanly}">🏠 LuckyDraw</a></li>
        <li><a th:href="@{/quanly/prizes(campaign=${campaignId})}">Kho giải thưởng</a></li>
        <li>Chỉnh Tỉ Lệ</li>
      </ul>
    </section>

    <div th:if="${errorMessage}" style="padding: 15px; margin: 15px; background-color: #f2dede; color: #a94442; border: 1px solid #ebccd1; border-radius: 4px;">
        <strong>Lỗi!</strong> <span th:text="${errorMessage}"></span>
    </div>

    <section class="content">
      <div class="box">
        <div class="box-body" style="padding: 20px;">
          <form th:action="@{/quanly/prizes/bulk-rates/save}" method="post">
            <input type="hidden" name="campaignId" th:value="${campaignId}">
            
            <table class="table-striped" style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
              <thead>
                <tr style="border-bottom: 2px solid #ddd; background: #f9f9f9;">
                  <th style="padding: 12px; text-align: left;">Giải Thưởng</th>
                  <th style="padding: 12px; text-align: left; width: 150px;">Tỉ Lệ Trúng (%)</th>
                  <th style="padding: 12px; text-align: left; width: 250px;">Loại</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="p : ${prizes}" style="border-bottom: 1px solid #eee;">
                  <td style="padding: 12px;">
                    <strong th:text="${p.tenGiai}"></strong><br>
                    <small style="color: #888;" th:text="${p.maGiaiThuong}"></small>
                  </td>
                  <td style="padding: 12px;">
                    <input type="hidden" name="ids" th:value="${p.maGiaiThuong}">
                    <input type="number" step="0.01" name="rates" th:value="${p.xacSuat}" 
                           th:readonly="${p.laGiaiThuong != true}"
                           style="width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 3px; font-size: 14px;"
                           th:styleappend="${p.laGiaiThuong != true} ? 'background-color: #eee; color: #777;' : ''">
                  </td>
                  <td style="padding: 12px; color: #666; font-size: 13px;">
                    <span th:if="${p.laGiaiThuong}">Quà Thực Tế (Tùy chỉnh)</span>
                    <span th:if="${p.laGiaiThuong != true}" style="color: #f39c12;">Quà Ảo (Tự động bù trừ)</span>
                  </td>
                </tr>
                <tr th:if="${prizes == null or prizes.isEmpty()}">
                  <td colspan="3" style="text-align: center; padding: 20px; color: #999;">Không có giải thưởng nào trong chiến dịch này.</td>
                </tr>
              </tbody>
            </table>

            <div style="display: flex; gap: 10px;">
              <button type="submit" style="background-color: #f39c12; color: #fff; border: none; padding: 8px 20px; border-radius: 3px; font-weight: bold; cursor: pointer;">Lưu Thay Đổi</button>
              <a th:href="@{/quanly/prizes}" style="background-color: #f4f4f4; color: #333; border: 1px solid #ddd; padding: 8px 20px; border-radius: 3px; text-decoration: none; display: inline-block;">Quay Lại</a>
            </div>
          </form>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
