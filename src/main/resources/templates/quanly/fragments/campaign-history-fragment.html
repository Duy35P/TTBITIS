<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
  <div th:fragment="content">
    <div class="box-body" style="max-height: 60vh; overflow-y: auto; padding: 15px;">

      <table style="width: 100%; border-collapse: collapse; margin-top: 15px;">
        <thead>
          <tr style="background-color: #f8fafc; border-bottom: 2px solid #cbd5e1;">
            <th style="padding: 10px; text-align: left;">Thời gian</th>
            <th style="padding: 10px; text-align: left;">Hành động</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="history : ${historyList}" style="border-bottom: 1px solid #e2e8f0;">
            <td style="padding: 10px;" th:text="${#temporals.format(history.createdAt, 'dd/MM/yyyy HH:mm:ss')}"></td>
            <td style="padding: 10px;" th:text="${history.description}"></td>
          </tr>
          <tr th:if="${historyList.isEmpty()}">
            <td colspan="2" style="padding: 10px; text-align: center; color: #64748b;">Chưa có lịch sử chỉnh sửa nào.</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="modal-footer" style="margin-top: 20px;">
      <button type="button" class="btn-default" onclick="closeModal('historyModal')">Đóng</button>
    </div>
  </div>
</body>
</html>
