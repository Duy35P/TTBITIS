<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{quanly/fragments/layout :: head('Kiểm Tra Mã Quà Tặng')}">
</head>
<body>
  <!-- Header -->
  <header th:replace="~{quanly/fragments/layout :: header}"></header>

  <!-- Sidebar -->
  <aside th:replace="~{quanly/fragments/layout :: sidebar}"></aside>

  <!-- Content -->
  <div class="content-wrapper">
    <section class="content-header">
      <h1>Kiểm Tra Mã Quà Tặng</h1>
    </section>
    
    <section class="content">
      
      <!-- Scanner Area -->
      <div class="scanner-box" style="background-color: #fff; border-radius: 8px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; margin-bottom: 25px; border-top: 4px solid #00a65a;">
        <h2 style="font-size: 20px; margin-bottom: 20px; color: #444; font-weight: 400;">Nhập mã Voucher của khách hàng</h2>
        <div class="search-container" style="display: flex; max-width: 600px; margin: 0 auto; gap: 10px;">
          <input type="text" class="form-control" style="flex: 1; padding: 15px 20px; font-size: 18px; border: 2px solid #ddd; border-radius: 4px; outline: none; font-family: monospace; text-transform: uppercase; letter-spacing: 2px;" id="voucherCodeInput" placeholder="VD: VCH-8A9X-214P" autocomplete="off" onkeypress="handleEnter(event)">
          <button sec:authorize="hasRole('ADMIN') or hasAuthority('QL_KIEMTRAMA')" class="btn btn-success" style="padding: 0 30px; font-size: 16px; font-weight: 600; border-radius: 4px; cursor: pointer; transition: 0.2s;" onclick="checkVoucher()">Kiểm tra mã</button>
        </div>       
      </div>

      <!-- Result Area (Hidden by default) -->
      <div class="result-box" id="resultBox" style="background-color: #fff; border-radius: 8px; padding: 0; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; display: none; margin-bottom: 25px;">
        <div class="result-header" style="padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background-color: #f9fafb; border-bottom: 1px solid #eee;">
          <div class="result-title" style="font-size: 16px; font-weight: 600; color: #333;">Thông tin Phiếu Thưởng</div>
          <div id="statusBadge" class="status-badge" style="padding: 6px 15px; border-radius: 20px; font-size: 14px; font-weight: 700;">Mã Hợp Lệ</div>
        </div>
        
        <div class="result-body" style="padding: 30px; display: flex; gap: 30px;">
          <div class="prize-icon" id="prizeIcon" style="width: 100px; height: 100px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; flex-shrink: 0;">🎁</div>
          <div class="info-grid" style="flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="info-item">
              <label style="display: block; font-size: 13px; color: #777; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px;">Mã Voucher</label>
              <div class="value code" id="resCode" style="font-family: monospace; color: #00a65a; font-size: 22px; letter-spacing: 1px; font-weight: 600;"></div>
            </div>
            <div class="info-item">
              <label style="display: block; font-size: 13px; color: #777; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px;">Phần Thưởng</label>
              <div class="value" id="resPrize" style="color: #d35400; font-size: 18px; font-weight: 600;"></div>
            </div>
            <div class="info-item">
              <label style="display: block; font-size: 13px; color: #777; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px;">Khách hàng trúng</label>
              <div class="value" id="resName" style="font-size: 18px; font-weight: 600; color: #111;"></div>
            </div>
            <div class="info-item">
              <label style="display: block; font-size: 13px; color: #777; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px;">Số điện thoại (SĐT)</label>
              <div class="value" id="resPhone" style="font-size: 18px; font-weight: 600; color: #111;"></div>
            </div>
            <div class="info-item" id="errorReasonContainer" style="display:none; grid-column: 1 / -1; background: #fef2f2; padding: 15px; border-left: 4px solid #dc2626; border-radius: 4px;">
              <label id="errorReasonLabel" style="color: #dc2626; display: block; font-size: 13px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px;">Lý do không hợp lệ</label>
              <div class="value" id="errorReason" style="color: #dc2626; font-size: 15px; font-weight: 600;"></div>
            </div>
          </div>
        </div>
        
        <div class="result-footer" style="padding: 20px; background-color: #f9fafb; border-top: 1px solid #eee; text-align: right;">
          <button class="btn btn-default" style="margin-right: 10px; padding: 12px 20px; border-radius: 4px;" onclick="resetScanner()">Hủy / Quét mã khác</button>
        </div>
      </div>

    </section>
  </div>

  <!-- Include layout JS block if needed, else raw script -->
  <div layout:fragment="scripts">
  <script>
    function handleEnter(e) {
      if(e.key === 'Enter') checkVoucher();
    }

    async function checkVoucher() {
      const input = document.getElementById('voucherCodeInput').value.trim();
      if(!input) {
        alert("Vui lòng nhập mã Voucher!");
        return;
      }

      try {
        const response = await fetch(`/quanly/redemption/check?code=${encodeURIComponent(input)}`);
        const data = await response.json();
        
        const resultBox = document.getElementById('resultBox');
        const badge = document.getElementById('statusBadge');
        const icon = document.getElementById('prizeIcon');
        const errContainer = document.getElementById('errorReasonContainer');
        const resCode = document.getElementById('resCode');

        resultBox.style.display = 'block';
        resCode.textContent = input;

        if (!response.ok) {
          // Lỗi
          if (data.detail) {
              // Mã đúng nhưng đã sử dụng
              badge.textContent = "Mã Đã Sử Dụng";
              badge.style.backgroundColor = "#ffedd5";
              badge.style.color = "#9a3412";
              icon.style.backgroundColor = "#fff7ed";
              icon.style.color = "#ea580c";
              icon.textContent = "⚠️";
              
              errContainer.style.display = "block";
              errContainer.style.backgroundColor = "#fff7ed";
              errContainer.style.borderLeftColor = "#ea580c";
              document.getElementById('errorReasonLabel').textContent = "Trạng thái mã";
              document.getElementById('errorReasonLabel').style.color = "#ea580c";
              document.getElementById('errorReason').style.color = "#ea580c";
              document.getElementById('errorReason').textContent = data.message;
              
              document.getElementById('resPrize').innerHTML = `${data.detail.tenGiai} <br/><span style="font-size:12px; margin-top:5px; display:inline-block;" class="label ${data.tonKho > 0 ? 'label-primary' : 'label-danger'}">Tồn kho CH: ${data.tonKho}</span>`;
              document.getElementById('resName').textContent = data.detail.tenKhach;
              document.getElementById('resPhone').textContent = data.detail.phone;
          } else {
              // Mã sai hoàn toàn
              badge.textContent = "Mã Không Hợp Lệ";
              badge.style.backgroundColor = "#fee2e2";
              badge.style.color = "#991b1b";
              icon.style.backgroundColor = "#fef2f2";
              icon.style.color = "#dc2626";
              icon.textContent = "❌";
              
              errContainer.style.display = "block";
              errContainer.style.backgroundColor = "#fef2f2";
              errContainer.style.borderLeftColor = "#dc2626";
              document.getElementById('errorReasonLabel').textContent = "Lý do không hợp lệ";
              document.getElementById('errorReasonLabel').style.color = "#dc2626";
              document.getElementById('errorReason').style.color = "#dc2626";
              document.getElementById('errorReason').textContent = data.message;
              
              document.getElementById('resPrize').textContent = "Không xác định";
              document.getElementById('resName').textContent = "Không xác định";
              document.getElementById('resPhone').textContent = "Không xác định";
          }
        } else {
          badge.textContent = "Mã Hợp Lệ";
          badge.style.backgroundColor = "#dcfce7";
          badge.style.color = "#166534";
          icon.style.backgroundColor = "#f0fdf4";
          icon.style.color = "#00a65a";
          icon.textContent = "🎁";
          errContainer.style.display = "none";
          
          document.getElementById('resPrize').innerHTML = `${data.detail.tenGiai} <br/><span style="font-size:12px; margin-top:5px; display:inline-block;" class="label ${data.tonKho > 0 ? 'label-primary' : 'label-danger'}">Tồn kho CH: ${data.tonKho}</span>`;
          document.getElementById('resName').textContent = data.detail.tenKhach;
          document.getElementById('resPhone').textContent = data.detail.phone;
        }
      } catch (e) {
        alert("Lỗi kết nối máy chủ");
      }
    }


    function resetScanner() {
      document.getElementById('voucherCodeInput').value = '';
      document.getElementById('resultBox').style.display = 'none';
      document.getElementById('voucherCodeInput').focus();
    }
  </script>
  </div>
</body>
</html>
